databases:
  - name: pawtion-db
    databaseName: pawtion_db
    user: pawtion
    plan: free

services:
  # Flask Backend
  - type: web
    name: pawtion-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pawtion-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: YOCO_SECRET_KEY
        sync: false
      - key: YOCO_WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: LOW_STOCK_DAYS
        value: "7"

  # React/Vite Frontend
  - type: web
    name: pawtion-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
